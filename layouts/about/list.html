{{ define "main" }}

<section class="section-sm">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto text-center">
        {{ partial "image.html" (dict "Page" . "Alt" "Image" "Class" "img-fluid d-block mx-auto rounded-circle mb-4" "Size" 500) }}
        <h1 class="widget-title">{{ .Title | markdownify }}</h1>
        <div class="content">
          {{ .Content }}
        </div>
      </div>
    </div>
  </div>
</section>

{{ end }}
