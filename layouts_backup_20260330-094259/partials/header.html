<header class="navigation">
  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-white bg-transparent border-bottom pl-0">
      <a class="navbar-brand mobile-view" href="{{ "/" | relLangURL }}">
        {{ partial "brand-logo.html" (dict "ImageClass" "img-fluid" "TextClass" "brand-text-logo") }}
      </a>

      <button class="navbar-toggler border-0" type="button" data-toggle="collapse" data-target="#navigation">
        <i class="ti-menu"></i>
      </button>

      <div class="collapse navbar-collapse text-center" id="navigation">
        <a class="navbar-brand desktop-view mr-lg-4" href="{{ "/" | relLangURL }}">
          {{ partial "brand-logo.html" (dict "ImageClass" "img-fluid" "TextClass" "brand-text-logo") }}
        </a>

        <ul class="navbar-nav ml-auto align-items-lg-center">
          {{ range .Site.Menus.main }}
          <li class="nav-item">
            <a class="nav-link" href="{{ .URL | absURL }}">{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>

        {{ if .Site.Params.search.enable }}
        <div class="search pl-lg-4">
          <button id="searchOpen" class="search-btn"><i class="ti-search"></i></button>
          <div class="search-wrapper">
            <form action="{{ `search/` | relLangURL }}" class="h-100">
              <input class="search-box px-4" id="search-query" name="s" type="search" placeholder="Search jobs and tips">
            </form>
            <button id="searchClose" class="search-close"><i class="ti-close text-dark"></i></button>
          </div>
        </div>
        {{ end }}
      </div>
    </nav>
  </div>
</header>
